<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小红花">
<meta name="theme-color" content="#E95D5D">
<link rel="manifest" href="/manifest.json">
<title>小红花日历</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }

  .phone-frame {
    width: 375px;
    max-width: 100vw;
    height: 100vh;
    max-height: 812px;
    background: #FFFBF0;
    overflow: hidden;
    position: relative;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 15% 30%, rgba(245,230,200,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 70%, rgba(240,225,195,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 10%, rgba(245,235,210,0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  .phone-frame > * {
    position: relative;
    z-index: 1;
  }

  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  .status-bar {
    height: 54px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 28px 6px;
    font-size: 14px;
    font-weight: 600;
    color: #4A3F37;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; }
  .status-bar .icons svg { width: 16px; height: 16px; }

  /* ===== HEADER ===== */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 20px 8px;
  }
  .app-header .left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flower-logo {
    width: 38px;
    height: 38px;
  }
  .flower-logo svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 1px 2px rgba(200,80,80,0.15)) drop-shadow(0 0 0 rgba(255,255,255,0.3));
  }
  .app-name {
    font-size: 18px;
    font-weight: 600;
    color: #E85D5D;
    letter-spacing: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .flower-count-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #FFF8F5;
    padding: 10px 12px;
    border-radius: 20px;
    box-shadow: 0 1px 4px rgba(232,93,93,0.08), 0 0 0 1px rgba(255,240,235,0.5);
    border: 1px solid #FFE8E0;
    min-height: 44px;
  }
  .flower-count-badge .count {
    font-size: 14px;
    font-weight: 600;
    color: #E85D5D;
  }

  /* ===== DATE BAR ===== */
  .date-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 6px;
  }
  .date-bar .date-text {
    font-size: 22px;
    font-weight: 700;
    color: #4A3F37;
  }
  .date-bar .date-sub {
    font-size: 13px;
    font-weight: 400;
    color: #B0A498;
    margin-left: 8px;
  }
  .date-bar .search-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #FFF8F0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .date-bar .search-btn svg { width: 16px; height: 16px; color: #A09890; }

  /* ===== 手绘分割线 ===== */
  .hand-drawn-line {
    height: 6px;
    margin: 0 20px;
  }
  .hand-drawn-line svg { width: 100%; height: 100%; }

  /* ===== CALENDAR SECTION ===== */
  .calendar-section {
    padding: 0 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .calendar-section::-webkit-scrollbar { display: none; }
  .week-label {
    font-size: 11px;
    color: #B0B0B0;
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .week-label .week-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #E85D5D;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    flex: 1;
  }
  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-height: 0;
  }
  .day-cell .day-label {
    font-size: 9px;
    color: #B8ADA4;
    font-weight: 500;
    height: 12px;
    line-height: 12px;
  }
  .day-cell .day-num {
    font-size: 13px;
    font-weight: 600;
    color: #4A3F37;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .day-cell.today .day-num {
    background: #E85D5D;
    color: #FFF;
  }
  .day-cell.weekend .day-num { color: #E8B0A8; }
  .day-cell.today.weekend .day-num { color: #FFF; }
  .day-cell .pills {
    display: flex;
    flex-direction: column;
    gap: 1px;
    align-items: center;
    flex: 1;
    width: 100%;
    overflow: hidden;
  }
  .pill {
    width: 100%;
    height: 13px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: #FFF;
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(180,160,140,0.08);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 2px;
  }
  .pill-coral { background: #FFB3AB; }
  .pill-yellow { background: #FFE082; color: #8B6914; }
  .pill-blue { background: #B3E5FC; }
  .pill-lavender { background: #E1BEE7; }
  .pill-mint { background: #C8E6C9; }
  .pill-peach { background: #FFCCBC; }
  .pill-rose { background: #F8BBD0; }
  .pill-sky { background: #BBDEFB; }
  .pill-more {
    width: 100%;
    height: 12px;
    border-radius: 6px;
    background: #F0F0F0;
    color: #A09890;
    font-size: 7px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-separator {
    height: 1px;
    background: repeating-linear-gradient(90deg, #F5EDE5 0px, #F5EDE5 4px, transparent 4px, transparent 8px);
    margin: 3px 0 5px;
  }

  /* ===== TODO SECTION ===== */
  .todo-section {
    padding: 0 20px;
    flex-shrink: 0;
  }
  .todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .todo-header .left {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .todo-header .flower-icon {
    width: 18px;
    height: 18px;
  }
  .todo-header .title {
    font-size: 14px;
    font-weight: 600;
    color: #4A3F37;
  }
  .todo-header .badge {
    background: #E85D5D;
    color: #FFF;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 16px;
    text-align: center;
  }
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .todo-card {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    background: #FFF9F0;
    border-radius: 14px;
    gap: 8px;
    box-shadow: 0 1px 3px rgba(200,180,160,0.1), 0 0 0 1px rgba(245,237,232,0.6);
    border: 1px solid rgba(245,237,232,0.8);
    position: relative;
  }
  .todo-card .priority-flower {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .todo-card .todo-text {
    font-size: 13px;
    font-weight: 500;
    color: #4A3F37;
    flex: 1;
  }
  .todo-card .priority-tag {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 500;
  }
  .tag-star { background: #FFF0E0; color: #E8A040; }
  .tag-normal { background: #F0F0F0; color: #A0A0A0; }
  .todo-card .drag-handle {
    color: #E0D8D0;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ===== Washi Tape ===== */
  .washi-tape {
    position: absolute;
    width: 40px;
    height: 12px;
    border-radius: 2px;
    opacity: 0.45;
    z-index: 2;
    background: rgba(240,225,195,0.6);
    box-shadow: 0 1px 2px rgba(180,160,140,0.1);
  }

  /* ===== 手绘分割线 ===== */
  .journal-divider {
    padding: 4px 20px;
  }
  .journal-divider svg { width: 100%; height: 8px; }

  /* ===== 小红花角落 ===== */
  .flower-corner {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 24px 12px;
    position: relative;
    min-height: 0;
  }
  .flower-corner .corner-text {
    font-size: 12px;
    color: #C8B8A8;
    font-weight: 400;
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }
  .corner-sticker {
    position: absolute;
    opacity: 0.3;
  }
  .sticker-star {
    top: 2px;
    right: 28px;
    width: 16px;
    height: 16px;
  }
  .sticker-heart {
    bottom: 6px;
    left: 32px;
    width: 12px;
    height: 12px;
  }

  /* ===== FAB: 小红花+新增按钮 ===== */
  .fab-container {
    position: absolute;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    z-index: 50;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .fab-container:hover { transform: scale(1.08); }
  .fab-container:active { transform: scale(0.95); }
  .fab-flower {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 2px 6px rgba(232,93,93,0.3)) drop-shadow(0 0 8px rgba(255,200,180,0.2));
  }

  /* ===== Quick Add Modal ===== */
  .quick-add-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(74,63,55,0.25);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .quick-add-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .quick-add-sheet {
    width: 375px;
    max-width: 100%;
    background: #FFF9F0;
    border-radius: 20px 20px 0 0;
    padding: 20px 24px calc(28px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    box-shadow: 0 -4px 20px rgba(180,160,140,0.15);
  }
  .quick-add-overlay.show .quick-add-sheet {
    transform: translateY(0);
  }
  .quick-add-handle {
    width: 36px;
    height: 4px;
    background: #E8DDD4;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .quick-add-title {
    font-size: 16px;
    font-weight: 600;
    color: #4A3F37;
    margin-bottom: 14px;
    text-align: center;
  }
  .quick-add-input {
    width: 100%;
    border: none;
    background: #FFFBF0;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 15px;
    color: #4A3F37;
    font-family: inherit;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(200,180,160,0.08), 0 0 0 1px rgba(245,237,232,0.6);
  }
  .quick-add-input::placeholder {
    color: #C8BCB0;
  }
  .quick-add-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .quick-add-cancel {
    flex: 1;
    padding: 12px;
    border: 1px solid #EDE6DF;
    border-radius: 14px;
    background: transparent;
    font-size: 14px;
    color: #8B7E74;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quick-add-cancel:hover { background: #FFF8F0; }
  .quick-add-save {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: #E85D5D;
    font-size: 14px;
    color: #FFF;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    box-shadow: 0 2px 8px rgba(232,93,93,0.2);
  }
  .quick-add-save:hover { background: #D94E4E; }
  .quick-add-save:disabled {
    background: #E8DDD4;
    box-shadow: none;
    color: #B0A498;
    cursor: default;
  }
  .quick-add-advance {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #B0A498;
    cursor: pointer;
    padding: 4px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quick-add-advance:hover { color: #E85D5D; }
  /* Quick Add Toast */
  .quick-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(74,63,55,0.88);
    color: #FFF;
    padding: 12px 24px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    font-family: inherit;
  }
  .quick-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ===== MAIN LAYOUT ===== */
  .main-content {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 54px);
    max-height: calc(812px - 54px);
    overflow: hidden;
  }
  .upper-half {
    flex: 5;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .lower-half {
    flex: 5;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    padding-top: 6px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="dynamic-island"></div>

  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24" fill="#333"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" fill="#333"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>

  <div class="main-content">

    <!-- ===== UPPER HALF ===== -->
    <div class="upper-half">

      <!-- App Header -->
      <div class="app-header">
        <div class="left">
          <div class="flower-logo">
            <img src="flower_logo.png" alt="小红花" style="width:100%;height:100%;filter:drop-shadow(0 1px 2px rgba(200,80,80,0.15)) drop-shadow(0 0 0 rgba(255,255,255,0.3));">
          </div>
          <span class="app-name">小红花</span>
        </div>
        <div class="header-right">
          <div class="flower-count-badge">
            <img src="flower_badge.png" alt="花" style="width:14px;height:14px;">
            <span class="count">128</span>
          </div>
        </div>
      </div>

      <!-- Date Bar -->
      <div class="date-bar">
        <div>
          <span class="date-text">6月2日</span>
          <span class="date-sub">星期二</span>
        </div>
        <div class="search-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
      </div>

      <!-- 手绘分割线 -->
      <div class="hand-drawn-line">
        <svg viewBox="0 0 335 6" fill="none" preserveAspectRatio="none">
          <path d="M0 3 Q20 1, 40 3.5 Q60 6, 80 3 Q100 0, 120 3.5 Q140 6, 160 3 Q180 0, 200 3.5 Q220 6, 240 3 Q260 0, 280 3.5 Q300 6, 320 3 L335 3" stroke="#F5EDE5" stroke-width="1.2" fill="none"/>
        </svg>
      </div>

      <!-- Calendar Section -->
      <div class="calendar-section">
        <div class="week-label"><span class="week-dot"></span> 本周</div>
        <div class="calendar-grid">
          <div class="day-cell today">
            <span class="day-label">一</span>
            <span class="day-num">2</span>
            <div class="pills">
              <div class="pill pill-coral">瑜伽</div>
              <div class="pill pill-blue">开会</div>
              <div class="pill pill-lavender">写报告</div>
              <div class="pill pill-more">+2</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">二</span>
            <span class="day-num">3</span>
            <div class="pills">
              <div class="pill pill-yellow">午餐</div>
              <div class="pill pill-rose">约会</div>
              <div class="pill pill-sky">复习</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">三</span>
            <span class="day-num">4</span>
            <div class="pills">
              <div class="pill pill-coral">做PPT</div>
              <div class="pill pill-mint">采购</div>
              <div class="pill pill-more">+3</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">四</span>
            <span class="day-num">5</span>
            <div class="pills">
              <div class="pill pill-blue">团建</div>
              <div class="pill pill-yellow">写周报</div>
            </div>
          </div>
          <div class="day-cell weekend">
            <span class="day-label">五</span>
            <span class="day-num">6</span>
            <div class="pills">
              <div class="pill pill-rose">逛街</div>

              <div class="pill pill-coral">聚餐</div>

          </div>
          <div class="day-cell weekend">
            <span class="day-label">六</span>
            <span class="day-num">7</span>
            <div class="pills">
              <div class="pill pill-lavender">画画</div>
              <div class="pill pill-sky">游泳</div>
            </div>
          </div>
          <div class="day-cell weekend">
            <span class="day-label">日</span>
            <span class="day-num">8</span>
            <div class="pills">
              <div class="pill pill-peach">看医生</div>
              <div class="pill pill-blue">开会</div>
              <div class="pill pill-more">+2</div>
            </div>
          </div>
        </div>

        <div class="week-separator"></div>

        <div class="week-label"><span class="week-dot" style="background:#ccc"></span> 下周</div>
        <div class="calendar-grid">
          <div class="day-cell">
            <span class="day-label">一</span>
            <span class="day-num">9</span>
            <div class="pills">
              <div class="pill pill-mint">跑步</div>
              <div class="pill pill-rose">约会</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">二</span>
            <span class="day-num">10</span>
            <div class="pills">
              <div class="pill pill-lavender">读书</div>
              <div class="pill pill-coral">面试</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">三</span>
            <span class="day-num">11</span>
            <div class="pills">
              <div class="pill pill-blue">培训</div>
              <div class="pill pill-peach">体检</div>
            </div>
          </div>
          <div class="day-cell">
            <span class="day-label">四</span>
            <span class="day-num">12</span>
            <div class="pills">
              <div class="pill pill-mint">交报告</div>
              <div class="pill pill-rose">庆功</div>
              <div class="pill pill-more">+2</div>
            </div>

          <div class="day-cell weekend">

<script src="store.js?v=3"></script>
<script>
  // ========== 首页动态渲染（v8a） ==========

  const pillColors = ['pill-coral','pill-yellow','pill-blue','pill-lavender','pill-mint','pill-peach','pill-rose','pill-sky'];

  // 更新日期显示
  function updateDateDisplay() {
    const today = new Date();
    const dateText = document.querySelector('.date-text');
    const dateSub = document.querySelector('.date-sub');
    if (dateText) dateText.textContent = `${today.getMonth() + 1}月${today.getDate()}日`;
    if (dateSub) dateSub.textContent = `星期${'日一二三四五六'[today.getDay()]}`;
  }

  // 获取本周一日期
  function getMonday(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
    date.setDate(diff);
    return date;
  }

  // 渲染多周日历（可滚动）
  function renderCalendar() {
    const section = document.querySelector('.calendar-section');
    if (!section) return;

    const today = new Date();
    today.setHours(0,0,0,0);
    const thisMonday = getMonday(today);

    const weekLabels = ['一','二','三','四','五','六','日'];

    function buildWeek(startDate, label, dotColor) {
      let html = `<div class="week-label"><span class="week-dot" style="background:${dotColor}"></span> ${label}</div>`;
      html += '<div class="calendar-grid">';
      for (let i = 0; i < 7; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const isToday = d.getTime() === today.getTime();
        const isWeekend = i >= 5;
        const events = EventStore.getByDate(dateStr);

        let pillsHtml = '';
        const maxShow = 3;
        events.slice(0, maxShow).forEach((e, j) => {
          const color = pillColors[j % pillColors.length];
          pillsHtml += `<div class="pill ${color}">${e.title.length > 4 ? e.title.substring(0,4)+'..' : e.title}</div>`;
        });
        if (events.length > maxShow) {
          pillsHtml += `<div class="pill pill-more">+${events.length - maxShow}</div>`;
        }

        html += `<div class="day-cell${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}" data-date="${dateStr}" style="cursor:pointer">
          <span class="day-label">${weekLabels[i]}</span>
          <span class="day-num">${d.getDate()}</span>
          <div class="pills">${pillsHtml}</div>
        </div>`;
      }
      html += '</div>';
      return html;
    }

    // 渲染前后各4周（共9周）
    section.innerHTML = '';
    for (let w = -4; w <= 4; w++) {
      const monday = new Date(thisMonday);
      monday.setDate(monday.getDate() + w * 7);
      const isThisWeek = w === 0;
      const isFuture = w > 0;
      const isPast = w < 0;
      let label, dotColor;
      if (isThisWeek) { label = '本周'; dotColor = '#E85D5D'; }
      else if (w === 1) { label = '下周'; dotColor = '#ccc'; }
      else if (w === -1) { label = '上周'; dotColor = '#ccc'; }
      else {
        const monthDay = `${monday.getMonth()+1}/${monday.getDate()}`;
        label = isFuture ? `${monthDay} 周` : `${monthDay} 周`;
        dotColor = '#e0e0e0';
      }
      section.innerHTML += buildWeek(monday, label, dotColor);
      if (w < 4) section.innerHTML += '<div class="week-separator"></div>';
    }

    // 滚动到本周
    setTimeout(() => {
      const todayCell = section.querySelector('.day-cell.today');
      if (todayCell) {
        todayCell.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }, 100);

    // 点击日期跳转日视图
    section.querySelectorAll('.day-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const date = cell.dataset.date;
        if (date) window.location.href = `xiaohonghua_detail.html?date=${date}`;
      });
    });
  }

  // 渲染今日待办
  function renderTodoList() {
    const todoList = document.querySelector('.todo-list');
    if (!todoList) return;
    const today = EventStore.todayStr();
    const stats = EventStore.getDayStats(today);

    // 更新badge数量
    const badge = document.querySelector('.todo-header .badge');
    if (badge) badge.textContent = stats.total;

    if (stats.total === 0) {
      todoList.innerHTML = '<div style="text-align:center;padding:24px;color:#D8CEC4;font-size:13px;">今天还没有安排<br>点击右下角 + 添加</div>';
      return;
    }

    todoList.innerHTML = '';
    const sorted = [...stats.todos, ...stats.schedules];

    sorted.forEach((event, i) => {
      const card = document.createElement('div');
      card.className = 'todo-card';
      const isDone = event.status === 'done';
      const tagHtml = event.priority === 'star'
        ? '<span class="priority-tag tag-star">⭐ 重点</span>'
        : '<span class="priority-tag tag-normal">普通</span>';

      card.innerHTML = `
        <img class="priority-flower" src="flower_todo.png" alt="" style="width:16px;height:16px;opacity:${isDone ? '0.3' : '1'};cursor:pointer" data-id="${event.id}">
        <span class="todo-text" style="${isDone ? 'text-decoration:line-through;color:#C8BCB0;' : ''}">${event.title}</span>
        ${tagHtml}
        <span class="drag-handle">≡</span>
        ${i % 3 === 0 ? '<div class="washi-tape" style="top:-4px;right:-6px;transform:rotate(-8deg);"></div>' : ''}
      `;

      // 点击花朵完成
      const flower = card.querySelector('.priority-flower');
      flower.addEventListener('click', () => {
        if (event.status === 'pending') {
          EventStore.toggleStatus(event.id);
          renderPage();
        }
      });

      todoList.appendChild(card);
    });
  }

  // 更新红花数量
  function updateFlowerCount() {
    const countEl = document.querySelector('.flower-count-badge .count');
    if (countEl) countEl.textContent = EventStore.getTotalFlowers();
  }

  function renderPage() {
    updateDateDisplay();
    renderCalendar();
    renderTodoList();
    updateFlowerCount();
  }

  // FAB → Quick Add 弹窗
  const fab = document.querySelector('.fab-container');
  if (fab) {
    fab.style.cursor = 'pointer';

    // 创建 Quick Add 弹窗
    const overlay = document.createElement('div');
    overlay.className = 'quick-add-overlay';
    overlay.innerHTML = `
      <div class="quick-add-sheet">
        <div class="quick-add-handle"></div>
        <div class="quick-add-title">今天想做什么？</div>
        <input class="quick-add-input" placeholder="买牛奶、学习英语、预约体检…" autofocus>
        <div class="quick-add-actions">
          <button class="quick-add-cancel">取消</button>
          <button class="quick-add-save" disabled>保存</button>
        </div>
        <div class="quick-add-advance">需要设置时间或优先级？ → 完整创建</div>
      </div>
    `;
    document.body.appendChild(overlay);

    const input = overlay.querySelector('.quick-add-input');
    const saveBtn = overlay.querySelector('.quick-add-save');
    const cancelBtn = overlay.querySelector('.quick-add-cancel');
    const advanceLink = overlay.querySelector('.quick-add-advance');

    function openQuickAdd() {
      overlay.classList.add('show');
      setTimeout(() => input.focus(), 300);
    }
    function closeQuickAdd() {
      overlay.classList.remove('show');
      input.value = '';
      saveBtn.disabled = true;
    }

    // 输入时启用保存按钮
    input.addEventListener('input', () => {
      saveBtn.disabled = !input.value.trim();
    });

    // Enter保存
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        saveBtn.click();
      }
    });

    // 保存
    saveBtn.addEventListener('click', () => {
      const title = input.value.trim();
      if (!title) return;
      EventStore.createEvent({
        title: title,
        type: 'todo',
        date: EventStore.todayStr(),
        priority: 'normal',
        status: 'pending'
      });
      closeQuickAdd();
      renderPage();
      // Toast
      const toast = document.createElement('div');
      toast.className = 'quick-toast';
      toast.textContent = '新增成功 🌸';
      document.body.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 1200);
    });

    // 取消
    cancelBtn.addEventListener('click', closeQuickAdd);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeQuickAdd();
    });

    // 高级创建
    advanceLink.addEventListener('click', () => {
      closeQuickAdd();
      window.location.href = 'xiaohonghua_create.html';
    });

    // 单击FAB → Quick Add
    fab.addEventListener('click', openQuickAdd);
  }

  // 红花badge跳转月总结
  const flowerBadge = document.querySelector('.flower-count-badge');
  if (flowerBadge) {
    flowerBadge.style.cursor = 'pointer';
    flowerBadge.addEventListener('click', () => {
      window.location.href = 'xiaohonghua_monthly_summary.html';
    });
  }

  // 初始化
  renderPage();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')

      .catch(err => console.warn('SW registration failed:', err));

</script>
